<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920">
  <defs>
    <style>
      .bg { fill: #fcfcfd; }
      .title { font: 700 34px Arial, sans-serif; fill: #1e293b; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .box { fill: #eefbf1; stroke: #4caf68; stroke-width: 2.2; rx: 18; ry: 18; }
      .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.8; rx: 16; ry: 16; }
      .boxtitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="920" class="bg"/>
  <text x="600" y="48" text-anchor="middle" class="title">Supervised Training Pipeline</text>
  <text x="600" y="78" text-anchor="middle" class="subtitle">How the base SED checkpoint is trained on labeled clips</text>

  <rect x="350" y="120" width="500" height="86" class="box"/>
  <text x="600" y="154" text-anchor="middle" class="boxtitle">1. Labeled Dataset</text>
  <text x="600" y="180" text-anchor="middle" class="body">Prepare 20-second chunks with species labels</text>

  <rect x="350" y="245" width="500" height="106" class="box"/>
  <text x="600" y="279" text-anchor="middle" class="boxtitle">2. Training Augmentation</text>
  <text x="600" y="305" text-anchor="middle" class="body">Apply MixUp and SpecAugment during training only</text>
  <text x="600" y="327" text-anchor="middle" class="small">This improves robustness to noisy audio conditions</text>

  <rect x="350" y="390" width="500" height="86" class="box"/>
  <text x="600" y="424" text-anchor="middle" class="boxtitle">3. Weighted Sampling</text>
  <text x="600" y="450" text-anchor="middle" class="body">Oversample rare species to reduce class imbalance</text>

  <rect x="350" y="515" width="500" height="96" class="box"/>
  <text x="600" y="549" text-anchor="middle" class="boxtitle">4. Forward Pass</text>
  <text x="600" y="575" text-anchor="middle" class="body">Run the SED model and convert framewise evidence</text>
  <text x="600" y="597" text-anchor="middle" class="small">into clip-level logits for supervised learning</text>

  <rect x="350" y="650" width="500" height="106" class="box"/>
  <text x="600" y="684" text-anchor="middle" class="boxtitle">5. Loss and Optimization</text>
  <text x="600" y="710" text-anchor="middle" class="body">CrossEntropy with label smoothing, AdamW optimizer,</text>
  <text x="600" y="732" text-anchor="middle" class="small">cosine learning-rate schedule, and gradient clipping</text>

  <rect x="350" y="795" width="500" height="86" class="box"/>
  <text x="600" y="829" text-anchor="middle" class="boxtitle">6. Checkpoint Selection</text>
  <text x="600" y="855" text-anchor="middle" class="body">Save the best validation model as the base checkpoint</text>

  <rect x="900" y="650" width="230" height="170" class="note"/>
  <text x="1015" y="682" text-anchor="middle" class="boxtitle">Key Settings</text>
  <text x="920" y="714" class="small">• MixUp alpha = 0.5</text>
  <text x="920" y="740" class="small">• Label smoothing = 0.1</text>
  <text x="920" y="766" class="small">• AdamW lr = 1e-4</text>
  <text x="920" y="792" class="small">• Weight decay = 1e-2</text>

  <line x1="600" y1="206" x2="600" y2="245" class="arrow"/>
  <line x1="600" y1="351" x2="600" y2="390" class="arrow"/>
  <line x1="600" y1="476" x2="600" y2="515" class="arrow"/>
  <line x1="600" y1="611" x2="600" y2="650" class="arrow"/>
  <line x1="600" y1="756" x2="600" y2="795" class="arrow"/>
</svg>
