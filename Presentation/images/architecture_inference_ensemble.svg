<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980">
  <defs>
    <style>
      .bg { fill: #fcfcfd; }
      .title { font: 700 34px Arial, sans-serif; fill: #1e293b; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .ibox { fill: #fff7df; stroke: #f59e0b; stroke-width: 2.2; rx: 18; ry: 18; }
      .ebox { fill: #f3edff; stroke: #8b5cf6; stroke-width: 2.2; rx: 18; ry: 18; }
      .boxtitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="980" class="bg"/>
  <text x="600" y="48" text-anchor="middle" class="title">Inference and Ensemble</text>
  <text x="600" y="78" text-anchor="middle" class="subtitle">Final prediction path for each 5-second segment</text>

  <rect x="330" y="120" width="540" height="86" class="ibox"/>
  <text x="600" y="154" text-anchor="middle" class="boxtitle">1. Soundscape Input</text>
  <text x="600" y="180" text-anchor="middle" class="body">Start from a 60-second audio recording</text>

  <rect x="330" y="245" width="540" height="96" class="ibox"/>
  <text x="600" y="279" text-anchor="middle" class="boxtitle">2. Windowing</text>
  <text x="600" y="305" text-anchor="middle" class="body">Split the recording into overlapping 20-second chunks</text>
  <text x="600" y="327" text-anchor="middle" class="small">using a 5-second step size</text>

  <rect x="330" y="380" width="540" height="96" class="ibox"/>
  <text x="600" y="414" text-anchor="middle" class="boxtitle">3. Per-Chunk SED Prediction</text>
  <text x="600" y="440" text-anchor="middle" class="body">Run each chunk through the SED model to get framewise probabilities</text>

  <rect x="330" y="515" width="540" height="116" class="ibox"/>
  <text x="600" y="549" text-anchor="middle" class="boxtitle">4. Temporal Refinement</text>
  <text x="600" y="575" text-anchor="middle" class="body">Combine overlap-average inference, Delta-Shift TTA,</text>
  <text x="600" y="597" text-anchor="middle" class="small">and Gaussian smoothing for more stable predictions</text>

  <rect x="330" y="670" width="540" height="86" class="ibox"/>
  <text x="600" y="704" text-anchor="middle" class="boxtitle">5. Segment-Level Scores</text>
  <text x="600" y="730" text-anchor="middle" class="body">Max-pool within each 5-second segment</text>

  <rect x="920" y="380" width="220" height="175" class="ebox"/>
  <text x="1030" y="412" text-anchor="middle" class="boxtitle">Ensemble Members</text>
  <text x="940" y="444" class="small">• tf_efficientnet_b3</text>
  <text x="940" y="470" class="small">• tf_efficientnet_b0</text>
  <text x="940" y="496" class="small">• eca_nfnet_l0</text>
  <text x="940" y="522" class="small">• tf_efficientnet_b4</text>
  <text x="940" y="548" class="small">• regnety_016 / regnety_008</text>

  <rect x="920" y="620" width="220" height="86" class="ebox"/>
  <text x="1030" y="654" text-anchor="middle" class="boxtitle">6. Arithmetic Mean</text>
  <text x="1030" y="680" text-anchor="middle" class="body">Average predictions across all models</text>

  <rect x="920" y="745" width="220" height="86" class="ebox"/>
  <text x="1030" y="779" text-anchor="middle" class="boxtitle">7. Final Output</text>
  <text x="1030" y="805" text-anchor="middle" class="body">Final prediction per 5-second segment</text>

  <line x1="600" y1="206" x2="600" y2="245" class="arrow"/>
  <line x1="600" y1="341" x2="600" y2="380" class="arrow"/>
  <line x1="600" y1="476" x2="600" y2="515" class="arrow"/>
  <line x1="600" y1="631" x2="600" y2="670" class="arrow"/>
  <line x1="870" y1="713" x2="920" y2="663" class="arrow"/>
  <line x1="1030" y1="706" x2="1030" y2="745" class="arrow"/>
</svg>
